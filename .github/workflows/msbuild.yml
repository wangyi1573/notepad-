name: Build VolcengineTranslation Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v3
        id: install-qt
        with:
          version: 5.15.2
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          install-deps: true
          cache: true

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Configure Qt Environment
        run: |
          $qtDir = "${{ steps.install-qt.outputs.qt-install-dir }}"
          Write-Host "Qt installed at: $qtDir"
          
          $env:QTDIR = $qtDir
          $env:PATH += ";$qtDir\bin"
          
          qmake --version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Qt qmake not found!"
            exit 1
          }
        shell: powershell

      - name: Generate VS Solution
        run: |
          $qtDir = "${{ steps.install-qt.outputs.qt-install-dir }}"
          $qmakePath = "$qtDir\bin\qmake.exe"
          
          Write-Host "Using qmake: $qmakePath"
          
          & $qmakePath VolcengineTranslation.pro -spec win32-msvc CONFIG+=release CONFIG+=x64
          
          if (-not (Test-Path "VolcengineTranslation.sln")) {
            Write-Error "Failed to generate VS solution!"
            Get-ChildItem -Path .
            exit 1
          }
        shell: powershell

      - name: Build with MSBuild
        run: |
          $qtDir = "${{ steps.install-qt.outputs.qt-install-dir }}"
          
          msbuild VolcengineTranslation.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m `
            /verbosity:minimal
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSBuild failed!"
            exit 1
          }
        shell: powershell

      - name: Find Build Output
        run: |
          Write-Host "Searching for build output..."
          Get-ChildItem -Path . -Recurse -Filter "*.dll" | ForEach-Object {
            Write-Host "Found DLL: $($_.FullName)"
          }
        shell: powershell

      - name: Package Build Artifacts
        run: |
          $outputDir = ".\bin\win64\Release"
          
          if (Test-Path $outputDir) {
            Write-Host "Packaging from: $outputDir"
            Compress-Archive -Path "$outputDir\*" -DestinationPath VolcengineTranslation_Release.zip -Force
          } else {
            Write-Error "Output directory not found: $outputDir"
            Get-ChildItem -Path . -Recurse -Directory | Select-Object FullName
            exit 1
          }
        shell: powershell

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolcengineTranslation-x64-Release
          path: VolcengineTranslation_Release.zip
          retention-days: 30
