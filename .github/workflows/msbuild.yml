name: Build VolcengineTranslation Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ${{ matrix.os }}  # 多镜像兼容，增加分配概率
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-2019, windows-2022 ]  # 同时适配2022（兼容VS2019）
    timeout-minutes: 30  # 超时时间设为30分钟，避免无限等待
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v3
        with:
          version: 5.15.2
          host: windows
          target: desktop
          arch: win64_msvc2017_64
          install-deps: true
          cache: true
          timeout: 10  # Qt安装超时设为10分钟

      # 后续步骤（Setup MSBuild/Generate/ Build/ Package/ Upload）保持不变
