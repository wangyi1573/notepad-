name: Build VolcengineTranslation Plugin

# 触发条件
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      # 步骤1：检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 步骤2：安装 Qt 5.15.2（推荐更高版本，和你的 msbuild arch 一致）
      - name: Install Qt 5.15.2 LTS
        uses: jurplel/install-qt-action@v3
        with:
          version: 5.15.2
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          install-deps: true
          cache: true
          # modules: 'qtbase qttools'

      # 步骤3：设置 MSBuild
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      # 步骤4：用qmake生成VS解决方案
      - name: Generate VS Solution
        run: |
          qmake.exe ^
            VolcengineTranslation.pro ^
            -spec win32-msvc ^
            CONFIG+=release ^
            CONFIG+=x64 ^
            -o VolcengineTranslation.sln
        shell: cmd
        working-directory: ${{ github.workspace }}

      # 步骤5：用MSBuild编译
      - name: Build with MSBuild
        run: |
          msbuild.exe ^
            VolcengineTranslation.sln ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /m ^
            /verbosity:minimal
        working-directory: ${{ github.workspace }}

      # 步骤6：打包编译产物（上传为Artifact）
      - name: Package Build Artifacts
        run: |
          if (Test-Path "./bin/win64/Release") {
              Compress-Archive -Path ./bin/win64/Release/* -DestinationPath VolcengineTranslation_Release.zip -Force
          } else {
              Write-Error "编译输出目录不存在！"
              exit 1
          }
        shell: powershell
        working-directory: ${{ github.workspace }}

      # 步骤7：上传产物到GitHub Actions Artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolcengineTranslation-x64-Release
          path: ${{ github.workspace }}/VolcengineTranslation_Release.zip
          retention-days: 30
